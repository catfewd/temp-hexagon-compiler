name: Build libhtp_ops_skel.so

on:
  workflow_dispatch:

jobs:
  build-skel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential curl wget git unzip python3 lld cmake ninja-build
      
      - name: Cache SDK zip
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /tmp/hexagon-sdk.zip
          key: hexagon-sdk-zip-v2
      
      - name: Download SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Hexagon SDK..."
          wget -q "https://softwarecenter.qualcomm.com/api/download/software/sdks/Hexagon_SDK/Linux/Debian/6.6.0.0/Hexagon_SDK_Linux.zip" -O /tmp/hexagon-sdk.zip
          echo "Downloaded: $(ls -lh /tmp/hexagon-sdk.zip)"
      
      - name: Extract SDK
        run: |
          if [ ! -d "/opt/hexagon-sdk/Hexagon_SDK" ]; then
            echo "Extracting SDK..."
            unzip -q /tmp/hexagon-sdk.zip -d /opt/hexagon-sdk
          fi
          ls /opt/hexagon-sdk/
      
      - name: Find SDK root
        id: sdk-root
        run: |
          SDK_ROOT=$(find /opt/hexagon-sdk -maxdepth 3 -name "setup_sdk_env.source" -exec dirname {} \; 2>/dev/null | head -1)
          echo "Found: $SDK_ROOT"
          echo "path=$SDK_ROOT" >> $GITHUB_OUTPUT
      
      - name: Build libhtp_ops_skel.so
        env:
          HEXAGON_SDK_ROOT: ${{ steps.sdk-root.outputs.path }}
        run: |
          SDK=$HEXAGON_SDK_ROOT
          TOOLS=$SDK/tools/HEXAGON_Tools/19.0.07
          HEXLIB=$TOOLS/Tools/target/hexagon/lib
          CMAKE_ROOT=/usr
          
          echo "SDK=$SDK"
          echo "TOOLS=$TOOLS"
          echo "Compiler: $(ls $TOOLS/Tools/bin/hexagon-clang*)"
          file $TOOLS/Tools/bin/hexagon-clang
          
          cd $GITHUB_WORKSPACE
          git clone https://github.com/haozixu/htp-ops-lib.git
          cd htp-ops-lib
          
          cmake -S . -B build_hex \
            -DCMAKE_TOOLCHAIN_FILE=$SDK/build/cmake/hexagon_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_MAKE_PROGRAM=$(which ninja) \
            -GNinja \
            -DHEXAGON_SDK_ROOT=$SDK \
            -DHEXAGON_CMAKE_ROOT=$SDK/build/cmake \
            -DHEXAGON_TOOLS_ROOT=$TOOLS \
            -DDSP_VERSION=v75 \
            -DQURT_OS=1 \
            -DV=hexagon_toolv19_v75 \
            -DPREBUILT_LIB_DIR=hexagon_toolv19_v75 \
            -DCMAKE_LIBRARY_OUTPUT_DIRECTORY=$(pwd)/build_hex/ship \
            -DCMAKE_RUNTIME_OUTPUT_DIRECTORY=$(pwd)/build_hex/ship \
            -DCMAKE_ARCHIVE_OUTPUT_DIRECTORY=$(pwd)/build_hex/ship
          
          cmake --build build_hex -j$(nproc)
          
          echo "=== Build results ==="
          find build_hex -name "*.so" 2>/dev/null
          ls -la build_hex/ship/ 2>/dev/null
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libhtp_ops_skel
          path: |
            ${{ github.workspace }}/htp-ops-lib/build_hex/ship/*.so
            ${{ github.workspace }}/htp-ops-lib/build_hex/ship/*.map
