name: Build libhtp_ops_skel.so

on:
  workflow_dispatch:

jobs:
  build-skel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential curl wget git unzip python3
      
      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /opt/hexagon-sdk
          key: hexagon-sdk-6.6.0.0
      
      - name: Download SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Hexagon SDK..."
          wget -q "https://softwarecenter.qualcomm.com/api/download/software/sdks/Hexagon_SDK/Linux/Debian/6.6.0.0/Hexagon_SDK_Linux.zip" -O /tmp/hexagon-sdk.zip
          unzip -q /tmp/hexagon-sdk.zip -d /opt/hexagon-sdk
          rm /tmp/hexagon-sdk.zip
          echo "Done. Contents:"
          ls /opt/hexagon-sdk/
      
      - name: Find SDK root
        id: sdk-root
        run: |
          SDK_ROOT=$(find /opt/hexagon-sdk -maxdepth 3 -name "setup_sdk_env.source" -exec dirname {} \; 2>/dev/null | head -1)
          echo "Found: $SDK_ROOT"
          echo "path=$SDK_ROOT" >> $GITHUB_OUTPUT
      
      - name: Build libhtp_ops_skel.so
        env:
          HEXAGON_SDK_ROOT: ${{ steps.sdk-root.outputs.path }}
        run: |
          source $HEXAGON_SDK_ROOT/setup_sdk_env.source
          export PATH=$HEXAGON_SDK_ROOT/tools/HEXAGON_Tools/19.0.07/Tools/bin:$PATH
          export LD_LIBRARY_PATH=$HEXAGON_SDK_ROOT/tools/HEXAGON_Tools/19.0.07/Tools/lib:$LD_LIBRARY_PATH
          
          cd $GITHUB_WORKSPACE
          git clone https://github.com/haozixu/htp-ops-lib.git
          cd htp-ops-lib
          
          HEXLIB=$HEXAGON_SDK_ROOT/tools/HEXAGON_Tools/19.0.07/Tools/target/hexagon/lib
          
          SRCS=""
          for f in src/dsp/*.c src/dsp/*.cc src/dsp/ops/*.c; do
            [ -f "$f" ] && SRCS="$SRCS $f"
          done
          
          clang -target hexagon-unknown-elf -march=hexagonv75 -shared -fPIC -mhmx \
            -o $GITHUB_WORKSPACE/libhtp_ops_skel.so $SRCS \
            -Iinclude -I$HEXAGON_SDK_ROOT/incs -I$HEXAGON_SDK_ROOT/incs/stddef -I$HEXAGON_SDK_ROOT/rtos/qurt \
            -fuse-ld=lld -nostdlib \
            -Wl,$HEXLIB/v75/G0/pic/initS.o -L$HEXLIB/v75/G0/pic -lgcc -Wl,$HEXLIB/v75/G0/pic/finiS.o
          
          file $GITHUB_WORKSPACE/libhtp_ops_skel.so
          ls -la $GITHUB_WORKSPACE/libhtp_ops_skel.so
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libhtp_ops_skel
          path: ${{ github.workspace }}/libhtp_ops_skel.so
