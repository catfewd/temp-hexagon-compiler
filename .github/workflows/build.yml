name: Build libhtp_ops_skel.so

on:
  workflow_dispatch:

jobs:
  build-skel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential curl wget git unzip python3 lld cmake ninja-build
      
      - name: Cache SDK zip
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /tmp/hexagon-sdk.zip
          key: hexagon-sdk-zip-v1
      
      - name: Download SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Hexagon SDK..."
          wget -q "https://softwarecenter.qualcomm.com/api/download/software/sdks/Hexagon_SDK/Linux/Debian/6.6.0.0/Hexagon_SDK_Linux.zip" -O /tmp/hexagon-sdk.zip
          echo "Downloaded: $(ls -lh /tmp/hexagon-sdk.zip)"
      
      - name: Extract SDK
        run: |
          if [ ! -d "/opt/hexagon-sdk/Hexagon_SDK" ]; then
            echo "Extracting SDK..."
            unzip -q /tmp/hexagon-sdk.zip -d /opt/hexagon-sdk
          else
            echo "SDK already extracted"
          fi
          ls /opt/hexagon-sdk/
      
      - name: Find SDK root
        id: sdk-root
        run: |
          SDK_ROOT=$(find /opt/hexagon-sdk -maxdepth 3 -name "setup_sdk_env.source" -exec dirname {} \; 2>/dev/null | head -1)
          echo "Found: $SDK_ROOT"
          echo "path=$SDK_ROOT" >> $GITHUB_OUTPUT
      
      - name: Build libhtp_ops_skel.so via SDK cmake
        env:
          HEXAGON_SDK_ROOT: ${{ steps.sdk-root.outputs.path }}
        run: |
          source $HEXAGON_SDK_ROOT/setup_sdk_env.source
          
          cd $GITHUB_WORKSPACE
          git clone https://github.com/haozixu/htp-ops-lib.git
          
          cd $HEXAGON_SDK_ROOT/build/cmake
          bash cmake_configure.bash $GITHUB_WORKSPACE/htp-ops-lib hexagon DSP_ARCH=v75 BUILD=Release
          
          echo "=== Build output ==="
          find $GITHUB_WORKSPACE/htp-ops-lib -name "*.so" -o -name "*.o" 2>/dev/null
          ls -la $GITHUB_WORKSPACE/htp-ops-lib/hexagon_toolv19_v75/ship/ 2>/dev/null
          ls -la $GITHUB_WORKSPACE/htp-ops-lib/hexagon_toolv19_v75/ 2>/dev/null
          find $GITHUB_WORKSPACE/htp-ops-lib -name "libhtp_ops_skel*" 2>/dev/null
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libhtp_ops_skel
          path: |
            ${{ github.workspace }}/htp-ops-lib/**/libhtp_ops_skel.so
            ${{ github.workspace }}/htp-ops-lib/**/libhtp_ops_skel.*
